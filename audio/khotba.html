      border-radius: 8px;

      right: 30px;
      bottom: 30px;

      font-weight: 600;

    @keyframes fadein {

<script>
  function afficherLive() {
    const now = new Date();

    // Jour de la semaine (0 = dimanche, 5 = vendredi)
    const day = now.getDay();
    const hours = now.getHours();
    const minutes = now.getMinutes();

    // Convertir en minutes depuis minuit
    const currentTime = hours * 60 + minutes;

    // Horaire test (vendredi 13:00 → 14:00)
    const startTime = 13 * 60;  // 13h00
    const endTime = 14 * 60;    // 14h00

    const container = document.getElementById("live-container");

    if (day === 5 && currentTime >= startTime && currentTime <= endTime) {
      // 🎥 Afficher le live
      if (!document.getElementById("live-iframe")) {
        container.innerHTML = `
          <iframe 
            id="live-iframe" 
            class="embed"
            src="https://direct.aflam4you.net/aloula-1hd-snrt-live-funding-tv_7.html" 
            width="100%" 
            height="500" 
            frameborder="0" 
            allow="accelerometer; clipboard-write; encrypted-media; picture-in-picture" 
            allowfullscreen>
          </iframe>
        `;
      }
    } else {
      // 🕒 Avant ou après la diffusion
      container.innerHTML = `
        <p style="text-align:center; font-size:18px; color:red;">
          خطبة الجمعة المباشرة قد انتهت. البث المباشر سيكون متاح فقط يوم الجمعة من 13:00 إلى 14:00
        </p>
      `;
    }
  }

  // Vérifie toutes les 5 secondes
  setInterval(afficherLive, 5000);

  // Vérifie immédiatement au chargement
  afficherLive();
</script>

        body:`بسم الله الرحمن الرحيم

حسن المعاملة وفوائده

الحمد لله الواحد الأحد الفرد الصمد، لم يلد ولم يولد، ولم يكن له كفؤا أحد، نحمده سبحانه وتعالى حمد الشاكرين لأنعمه، ونشهد أنه الله الذي لا رب لنا سواه، أمر بحسن القول في محكم تنزيله، فقال وهو الصادق: ﴿وَقُولُواْ لِلنَّاسِ حُسْناٗۖ﴾.[1]

ونشهد أن سيدنا محمدا عبده ورسوله، المحمود في سيرته: فعله ومقوله، صلى الله وسلم عليه، وعلى آله الطيبين الطاهرين، وأصحابه نجوم الهدى وبدور الاقتداء، والتابعين لهم في حسن الأداء وحسن الاقتضاء.

أما بعد، تحدثنا في الخطبة السابقة عن جانب من جوانب الحرص على أكل الحلال، وذلك بالإخلاص في كل عمل مأجور أو خدمة مأجورة واليوم نتناول جانبا آخر من هذا الحرص على أكل الحلال وذلك بالحرص على الإخلاص في المعاملات التجارية وغيرها.

عباد الله؛ إن المعاملة باب واسع يشمل كل علاقة بين اثنين لأي سبب كانت تلك العلاقة، من بيع وشراء وإجارة وكراء وزواج وجوار وشراكة ووظيفة، وغير ذلك من أوجه العلاقة بينك وبين الآخرين، فيطالب كل واحد منا بحسن أداء واجبه مع الناس، بحيث يرفق بهم ويسهل قضاء حوائجهم، ما دام في وسعه إسعافهم.

روى الإمام مالك رحمه الله عن معاذ بن جبل رضي الله عنه، قال:

آخر ما أوصاني به رسول الله ﷺ حين وضعت رجلي في الغرز- أي في الركاب- أن قال: أحسن خلقك للناس يا معاذ بن جبل[2].

وذلك لما بعثه واليا على اليمن.

وحسن المعاملة هو جملة من الأخلاق الرفيعة التي يحيى بها المسلم، وبها يحقق لنفسه ولغيره السعادة الدنيوية والحياة الطيبة، كما يؤجر عليها في الآخرة بأحسن منها، إذ الجزاء من جنس العمل كما قال تعالى:

﴿هَلْ جَزَآءُ اُ۬لِاحْسَٰنِ إِلَّا اَ۬لِاحْسَٰنُۖ﴾.[3]

وأول هذه الأخلاق: المحبة للناس؛ فمن أحب الناس أحب لهم الخير، ومقتضاه ألا يَغشهم ولا يخونهم في المعاملة وذلك من كمال إيمانه، ويعود عليه بالنفع بين إخوانه. لقول النبي ﷺ:

 لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه[4].

ثانيها: الصدق؛ وهو الذي يبارك الله به في المعاملة فيقويها وتسود الثقة بين الناس وتعم، وبذلك يحصل على حقه ويؤدي واجبه بكل يسر وسهولة، وتحصل له البركة فيما أخذ أو أعطى، كما قال النبي ﷺ:

البيعان بالخيار ما لم يتفرقا، فإن صدقا وبينا بورك لهما في بيعهما.[5]

ثالثها: السماحة واليسر، وعدم التعسير في الأمور البسيطة واليسيرة، فالمعاملة مبنية على العفو عن الشيء اليسير وعدم  المشاحة فيه، ولذا قال النبي ﷺ:

رحم الله عبدا سمحا إذا باع ... [6].

ومعنى سمحا؛ أي سهل الخلق طيب النفس يتعامل مع الناس برفق ولين وطلاقة وجه.

 فيحظى وهو متصف بهذا الخلق بدعوة النبي ﷺ بالرحمة وأَنْعِمْ بها من مكافأة، رحمة تشمل نفسه وولده ورزقه وآجلته وعاجلته. نفعني الله وإياكم بقرآنه المبين وبحديث سيد الأولين والآخرين، وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله ولي الصالحين، والصلاة والسلام على سيدنا محمد الصادق الأمين، وعلى آله وصحبه أجمعين.

عباد الله، رابع محاسن الأخلاق في المعاملة: الكلمة الطيبة؛ فمن الأمور المطلوبة عند المعاملة الكلمة الطيبة لقول النبي ﷺ:

والكلمة الطيبة صدقة[7]

ومن ذلك الدعاء من المتبايعين لبعضهما بالبركة والربح والخلف في المال، وهي مفردات ترسخت ولله الحمد في ثقافة الناس، كقولهم لبعضهم: (الله يربح، الله يخلف، الله يسخر)، وغيرها من الكلمات، التي بدأنا نفقدها اليوم في معاملات البعض، إذ يقبض مالا أو يدفع سلعة ولا يحسن كلمة طيبة ولا طلاقة وجه ولا دعوة بالبركة.

خامسها: النصح في المعاملة؛ بحيث تفكر في مصلحة صاحبك كما تفكر في مصلحتك، وتنصح له فيما ينفعه وينفعك، لا فيما ينفعُك وحدك لقول جرير بن عبد الله رضي الله عنه:

بايعت رسول الله ﷺ على إقام الصلاة وإيتاء الزكاة والنصح لكل مسلم[8].

بهذه الأخلاق وغيرها، إخوة الإيمان؛ يؤتي حسن المعاملة ثماره وفوائده في حياة الفرد والجماعة، حتى يعيشوا جميعا الحياة الطيبة الموعودة.

عباد الله، نستحضر في هذه الأيام هجرة الرسول ﷺ بمناسبة العام الهجري الجديد، وهي مناسبة عظيمة تذكر بتضحيات النبي ﷺ، وما عاناه من قومه الذين أخرجوه من بلده، وقد لخص النبي ﷺ معاني الهجرة في قوله ﷺ:

والمهاجر من هجر ما نهى الله عنه[9]

وهذا يعني أن نصيبنا نحن من الهجرة هو هجرة المعاصي، ومن أخطرها ما تناولناه في هاتين الخطبتين من وجوب تجنب أكل أموال الناس بالباطل، عن طريق الغش أو السرقة أو الرشوة أو الغلول، وهو أخذ المال العام بغير وجه حق، وكل وجه غير مشروع.

وفي مقابل ذلك يحرص المؤمن على أكل الحلال، والصدق في المعاملة، والنصح للناس أخذا وعطاء، قضاء واقتضاء، بيعا وشراء، لينال رحمة الله تعالى التي وعد بها المتسامحين في المعاملات، وعفوه تعالى عمن يعفو عن الناس ويتحقق بمضمون قول النبي ﷺ:

إنما الأعمال بالنيات وإنما لكل امرئ ما نوى فمن كانت هجرته إلى الله ورسوله، فهجرته إلى الله ورسوله ...[10]

 أي من كانت هجرته وتوجهه وغايته في كل تصرفاته يقصد بها وجه الله، فإن الله تعالى لا يضيع أجره وثوابه.

وهذا الحديث يجعل المؤمن في هجرة دائمة وإقبال مستمر على الله تعالى، مأجورا على كل أعماله؛ عقيدة كانت أو عبادة أو معاملة أو سلوكا.

ومسك الختام أفضل الصلاة وأزكى السلام على النبي الخاتم، سيدنا محمد، اللهم صل وسلم على سيدنا محمد عدد ما كان وما يكون إلى ما شئت مما لا حد له من صلاة وتسليم، وارض اللهم عن الصحابة الكرام خصوصا منهم المهاجرين والأنصار، والتابعين لهم بإحسان إلى يوم الدين.

وانصر اللهم من قلدته أمر عبادك، أمير المؤمنين جلالة الملك محمدا السادس نصرا عزيزا تعز به الدين، وترفع به راية المسلمين. اللهم اجعل مفاتيح الخير على يديه، اللهم أعد على جلالته أمثال هذه المناسبة، وهو يرفل في حلل الصحة والعافية، اللهم أقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولاي الحسن، وشد أزر جلالته بشقيقه السعيد، صاحب السمو الملكي الأمير الجليل مولاي رشيد، وبباقي أفراد الأسرة الملكية الشريفة، إنك سميع مجيب.

وارحم اللهم الملكين الجليلين المجاهدين مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجعلهما في مقعد صدق عندك، واجزهما عنا خير ما جزيت محسنا عن إحسانه.

اللهم اجعلنا متحابين متناصحين، متعاملين بالحسنى، متعاونين على البر والتقوى، متسامحين في الأخذ والعطاء، مهاجرين إليك في السر والعلانية، ابتغاء مرضاتك وتعرضا لعفوك وغفرانك، اللهم حبب إلينا من الأعمال ما يرضيك.

ربنا آتنا من لدنك رحمة وهيئ لنا من أمرنا رشدا.

الحرص على الكسب الحلال سجية للمسلم

الحمد لله الذي جعل الناس في أرزاقهم متفاضلين، وفي أعمالهم مختلفين، وعلى مصالحهم متكاملين ومتعاونين، نحمده سبحانه وتعالى على ما أولانا، ونشكره على ما هدانا، ونشهد أن لا إله إلا الله وحده لا شريك له، شهادة صدق وإخلاص، ونشهد أن سيدنا محمدا عبده ورسوله، وحبيبه وخليله، صلى الله وسلم عليه بما هو أهله، وعلى آله الطيبين الطاهرين، وصحابته الغر الميامين، وعلى التابعين لهم بإحسان إلى يوم الدين.

أما بعد، فيا معاشر المؤمنين والمؤمنات، لقد تحدثنا في خطبتين سابقتين عن حرص المسلم على الكسب الحلال، إما من جهة الإخلاص في العمل المأجور وإما من جهة الصدق وعدم الغش في المعاملات. وبينا أهمية ذلك في حياته، وبكل ما يتناوله في ليله ونهاره وصباحه ومسائه، مع ارتباطه بما لله تعالى من حق الإيمان والعمل الصالح، ومن حق العباد في الصدق والإتقان ومراقبة الله تعالى في أموالهم وسائر حقوقهم.

روى أبو داود عن أم سلمة، رضي الله عنها قالت: ما خرج النبي صلى الله عليه وسلم من بيتي قط إلا رفع طَرْفَه إلى السماء فقال: «اللهم إني أعوذ بك أن أَضِل أو أُضَل أو أَزِل أو أُزَل أو أَظلِم أو أُظلَم أو أَجهَل أو يُجهَل عليَّ»[1].

هذا هو حال سيدنا رسول الله ﷺ يدعو ربه أن يحفظه في يومه، من الضلالة والزلل والظلم والجهل، فإن نجا المؤمن من هاته الأوصاف كانت معاملته حسنة وكسبه حلالا، وعندما يعود المؤمن إلى بيته مساءً يحاسب نفسه على العمل الذي أنجزه في يومه، هل أتقنه وأخلص فيه؟ هل عَمِله قربة وتدينا، ينتظر بذلك الأجر العظيم من الله تعالى؟ أم غابت عنه هذه المعاني فلا يرى إلا الربح الدنيوي، ناسيا قوله تعالى:

مَاعِندَكُمْ يَنفَدُۖ وَمَا عِندَ اَ۬للَّهِ بَاقٖۖ وَلَيَجْزِيَنَّ اَ۬لذِينَ صَبَرُوٓاْ أَجْرَهُم بِأَحْسَنِ مَا كَانُواْ يَعْمَلُونَۖ[2].

وبذلك تصير المراقبة ومحاسبة النفس مَلَكَةً له - أي طبيعة راسخة في نفسه- ودأبا ودَيْدَنا وسلوكا؛ قال الله تعالى:

و َاعْلَمُوٓاْ أَنَّ اَ۬للَّهَ يَعْلَمُ مَا فِےٓ أَنفُسِكُمْ فَاحْذَرُوهُۖ[3].

وهي حال يستشعر فيها المسلم قرب الحق منه، فيتحلى بمقام الإحسان الذي يجعله متقنا لعمله متحريا الكسب الحلال فيه.

روى البخاري في صحيحه عن ابن عمر أن رسول الله ﷺ، ذكر ثلاثة نفر، خرجوا فغيَّمت عليهم السماء وأَوَوْا إلى غارٍ فطبَّقَت عليهم صخرةٌ وسَدَّت عليهم الباب، ولا يَعْلَم بهم أَحَدٌ، فتَوسَّلُوا إلى الله تعالى بأخلص أعمالهم؛ تَوسل أحدهم بِبِرِّ الوالدين وتقديمِهما عند الشراب على أولاده، وتوسل الثاني بتِرك المَعْصِيَّة بعد التَّمَكُّن منها مخَافةَ الله تعالى، وقال الآخر: اللهم إِنْ كُنتَ تَعلَمُ أَنِّي اسْتَأْجَرتُ أَجيرا بفَرَقٍ من ذُرَةٍ- وفي رواية من أَرُزٍّ فَأَعطَيْتُه، وأَبَى أن يأْخُذَه، فَعَمدت إلى ذلك الفَرَقِ –والفَرَقُ مِكيال يَسَعُ ستة كيلوا كرامات- فَزَرَعْتُه، حتى اشتريت منه بقرا وراعِيَها، ثم جاء فقال: يا عبدَ الله، أعطني حقِّي، فقلت: انْطَلِق إلى تِلك البَقر وراعيها، فإنها لك، فقال: أتستهزئ بي؟ قال: فقُلت: ما أستهزئ بك، ولكنَّها لك. اللهم إِنْ كنتَ تَعلَم أَني فعلتُ ذلك ابتغاءَ وَجهِك، فافرِج عنّا، فكشف عنهم، فخرجوا يمشون.[4].

عباد الله، الجامع بين هؤلاء الثلاثة هو أنهم جميعا توسلوا بصالح عملهم حين أخلصوا فيه النية وأتقنوه وأحسنوا فيه، وأنهم فعلوا تلك الأعمال تقربا إلى الله تعالى، حين قال كل واحد منهم: "اللهم إن كنت تعلم أني فعلت ذلك ابتغاء وجهك"؛ إذ لو كان للنفس في هاته الأعمال نصيب وحظوظ وهوى، لما بلغت بهم تلك المنازل العظيمة، ولما نفعتهم في وقت الشدة، لأن آثار الأعمال الصالحة تظهر على صاحبها في العاجلة قبل الآجلة.

 وهذا غاية ما يمكن أن يصل إليه المسلم من البر والإحسان، والكسب الطيب ورعاية حقوق الآخرين بالإتقان والإجادة.

نفعني الله وإياكم بقرآنه المبين، وبحديث سيد الأولين والآخرين، وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله ذي الطَّوْل والإنعام، والصلاة والسلام على خير الأنام، وشمس الهدى في دياجير الظلام، وعلى آله الكرام، وصحابته بدور التمام، والتابعين لهم بإحسان ما توالت الليالي والأيام.

عباد الله، إن التقرب إلى الله بالمعاملات هو ثمرة التقوى إلى الله، وهو ما بينته القصة آنفا فيجب على المسلم التأسي والاقتداء ويستعين في ذلك بذكر الله، فالذكر مفتاح لأبواب الخير مغلاق لأبواب الشر، تطمئن به القلوب وتسعد؛ ولذا ندب الشارع الحكيم إلى الذكر عند الشروع في كل عمل أيا كان بقول المؤمن: "بسم الله" يفتتح به عمله. فيُبارَكُ له فيه ويُعانُ عليه، ويختمه بقوله: "الحمد لله" شكرا لله تعالى على أن منحه القوة والأمانة والإخلاص في إنجازه، وأبعده عن الكسب الخبيث.

والذي ينبغي أن نتواصى به هو أن يحرص كل واحد منا في صباحه على أن يعقد النية على الإخلاص في عمله ومعاملاته، وإذا عاد في المساء حاسب نفسه على ما كان فيه من نقص يستدركه في ما يأتي من الأيام حتى تصبح هذه العادة عنده راسخة ثابتة، ولعمري ذلك هو حقيقة الذكر وثمرته.

وبذلك، إخوة الإيمان، نكون قد تَعبَّدنا الله بمعاملاتنا، وأطعناه بإخلاصنا في عملنا وإتقاننا له، فيكون الله معنا في سائر الأحوال، بالإعانة والتسديد والتيسير.

وعلى هذا الأساس يعمل التاجر في ماله تدينا وقربة، ويعلِّم الأستاذ أبناء الأمة تدينا وقربة، ويعالج الطبيب المرضى تدينا وقربة، ويحرُس رجل الأمن ثغره تدينا وقربة، وينصح الموظف في وظيفته تدينا وقربة، ويحترم السائق قوانين السير تدينا وقربة، ويحترم الجميع القوانين المنظمة للحياة تدينا وقربة، ويقوم كل فرد من أفراد المجتمع، بمسؤوليته تدينا وقربةـ

فيكون حال الأمة متصفا بالتضامن والتعاون على البر والتقوى، خاليا مما يسلب الناس حياتهم الطيبة، محقِّقا لعناصر الرقي والازدهار والرخاء.

هذا ولنجعل مسك الختام أفضل الصلاة وأتم التسليم على خاتم الأنبياء والمرسلين، فاللهم صل وسلم على سيدنا محمد صلاة وسلاما تامين دائمين إلى يوم الدين، وارض اللهم عن خلفائه الراشدين: أبي بكر وعمر وعثمان وعلي، وعن باقي الصحب من المهاجرين والأنصار، والتابعين لهم بإحسان، وعنا معهم برحمتك يا أرحم الراحمين يا رب العالمين.

وانصر اللهم من وليته أمر عبادك، وبسطت يده في أرضك وبلادك، عبدك الخاضع لجلالك وسلطانك، مولانا أمير المؤمنين جلالة الملك محمدا السادس نصرا تعز به دينك، وترفع به راية عبادك الصالحين. وأقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولانا الحسن، وشد أزره بشقيقه السعيد، الأمير الجليل مولانا رشيد، وبباقي أفراد الأسرة الملكية الشريفة.

وارحم اللهم بواسع مغفرتك وكريم جودك الملكين المجاهدين، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجزهما خير ما جزيت محسنا عن إحسانه.

اللهم آت نفوسنا تقواها، وزكها أنت خير من زكاها، أنت وليها ومولاها، اللهم ارحمنا وارحم والدينا وارحم من سبقنا بالإيمان وارحم بفضلك جميع المسلمين والمسلمات والمؤمنين والمؤمنات، الأحياء منهم والأموات، إنك سميع قريب مجيب الدعوات.

المعاشرة بالمعروف بين الأزواج

الحمد لله الذي بنى العلاقة الزوجية على السكينة والمودة والرحمة، وجعل من أسباب استدامتها الإيمان والعدل والمعاشرة الحسنة، نحمده تعالى على نعمه التي لا تحصى، ونشكره على آلائه التي لا تستقصى، ونشهد أن لا إله إلا الله وحده لا شريك له، انفرد بالصمدية والكبرياء أزلا وأبدا، فلم يتخذ من دونه صاحبة ولا ولدا، ونشهد أن سيدنا محمدا عبد الله ورسوله، أكرم الناس ولدا وزوجا وأبا، وأحسنهم خلقا وعِشْرة وأدبا، صلى الله وسلم عليه بما هو أهله، وعلى آله وصحبه ومن سلك نهجه واتبع صراطه المستقيم، وعلى التابعين لهم بإحسان في كل وقت وحين.

أما بعد، أيها الإخوة المؤمنون والأخوات المؤمنات، يقول الله تعالى في محكم تنزيله:

﴿وَعَاشِرُوهُنَّ بِالْمَعْرُوفِۖ﴾.[1]

في هذه الآية الكريمة يأمر البارئ جل وعلا الأزواج بمعاشرة أزواجهم بالمعروف؛ والمعروف في القرآن الكريم؛ هو ما يستحسن من الأفعال والأقوال، وما أمر الله به من الخير والفضل والإحسان.

وقد وردت كلمة المعروف في حديث القرآن عن الأسرة في أكثر من عشرين موضعا، مما يعطيها أهمية كبرى، وتعتبر المودة والرحمة فيها واجبا شرعيا، يجب الاتصاف به وإشاعته في الحياة الأسرية، من أجل تحقيق السعادة والحياة الطيبة.

فقد وردت كلمة المعروف في الحقوق والواجبات بين الزوجين في قوله تعالى:

﴿وَلَهُنَّ مِثْلُ اُ۬لذِے عَلَيْهِنَّ بِالْمَعْرُوفِۖ﴾[2]

فتكون الحقوق والواجبات بينهما وفق الأعراف والتقاليد الصحيحة.

وذكر الحق سبحانه وتعالى المعروف في النفقة والصداق. فقال سبحانه:

﴿وَءَاتُوهُنَّ أُجُورَهُنَّ بِالْمَعْرُوفِ مُحْصَنَٰتٍ غَيْرَ مُسَٰفِحَٰتٖ﴾[3].

وقوله جل وعلا:

﴿عَلَي اَ۬لْمُوسِعِ قَدْرُهُۥ وَعَلَي اَ۬لْمُقْتِرِ قَدْرُهُۥ مَتَٰعاَۢ بِالْمَعْرُوفِۖ حَقّاً عَلَي اَ۬لْمُحْسِنِينَۖ﴾[4].

حيث أوصى أن النفقة والصداق، يكونان بحسب حال المنفق وألا يكلَّف الإنسان فوق طاقته المادية، تيسيرا للحياة وترشيدا لكلفتها، حرصا على سلامة المعاني الأسرية وقيمها والغايات التي تنشدها.

إن الأمر بالمعروف في الأسرة، أَمْرٌ بالمعاملة الطيبة والاحترام والبر والفضل والتكامل والمحبة والمودة، أَمْرٌ بالتقدير والمعاشرة بالحسنى.

وهذه القيم في الأسرة أساس التماسك والتساكن بين أفرادها، وهي الغاية من وجودها.

كما قال الله تعالى:

﴿وَمِنَ اٰيَٰتِهِۦٓ أَنْ خَلَقَكُم مِّن تُرَابٖ ثُمَّ إِذَآ أَنتُم بَشَرٞ تَنتَشِرُونَۖ (19) وَمِنَ اٰيَٰتِهِۦٓ أَنْ خَلَقَ لَكُم مِّنَ اَنفُسِكُمُۥٓ أَزْوَٰجاٗ لِّتَسْكُنُوٓاْ إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةٗ وَرَحْمَةًۖ اِنَّ فِے ذَٰلِكَ لَأٓيَٰتٖ لِّقَوْمٖ يَتَفَكَّرُونَۖ﴾[5].

 عباد الله؛ إن بناء الأسرة على قيم الدين، هو الذي يؤصل أخلاق المودة والمعروف فيها، من خلال الاعتراف بالفضل بين الأزواج وحفظ الأسرار الزوجية، وقول الخير وحفظ اللسان، فإذا كانت وصية الله تعالى للناس بقول الخير،

﴿وَقُولُواْ لِلنَّاسِ حُسْناٗۖ﴾[6].

فهي أوجب في حق الأسرة، وهي أبرز وأجل مظاهر المعروف والتي تظهر في مناداة الزوجين على بعضهما وطلب الحاجة والمحاورة والحديث وخاصة عند الخلاف.

ولقد

"كان رسول الله ﷺ، يقول لأم المؤمنين عائشة رضي الله عنها، يا عائش"[7]

، وهو ما يدل على حسن المعاشرة من سيد الخلق لأم المؤمنين رضي الله عنها. وقد صح ﷺ أنه قال:

"خَيرُكم خَيرُكم لأهلِه، وأنا خَيرُكم لأهلي."[8]

عباد الله؛ بعد أداء الحقوق والقيام بالواجبات فإن الكلمة الطيبة تشعر بالرضى في القلوب، وتحدث في النفوس من الصفاء والمودة ما يجعل الأسرة قادرة على الصبر عند المحن، مستشعرة معاني التضحية التي تؤهلها لتعيش الحياة الطيبة.

نفعني الله وإياكم بالقرآن المبين وبحديث سيد الأولين والآخرين وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله حق حمده، والصلاة والسلام على نبيه وعبده، سيدنا محمد وعلى آله وصحبه.

عباد الله، إن المعاشرة بالمعروف بين الأزواج تعني كل أنواع المكارمة، بدءا بالمحبة والرحمة إلى المشاورة وتبادل الآراء في أمور البيت والأولاد، لقوله سبحانه:

﴿وَاتَمِرُواْ بَيْنَكُم بِمَعْرُوفٖۖ﴾[9].

ومن المعاشرة بالمعروف كذلك، أن يحب كل طرف أقارب الطرف الآخر، فهو أسمى أوجه المعاشرة بالمعروف، ومنه الاستماع إلى هموم الطرف الآخر واحترام مشاعره والرفق به لا سيما في أزماته النفسية، وعدم إلقاء الملامة عليه         إن كان في حالة التعب، وإنما تجب مراعاة ذلك امتثالا لقول الحق سبحانه:

﴿وَلَا تَنسَوُاْ اُ۬لْفَضْلَ بَيْنَكُمُ﴾[10]

وأهم ما يؤهل للمعاشرة بالمعروف الإيمان بالله تعالى؛ إذ هو الركيزة الكبرى التي تنبني عليها العلاقة الزوجية.

ولا يتم ذلك كله إلا بالإنصاف من النفس، والمراد بذلك هنا تبادل الحقوق والواجبات بين الزوجين، لا أن يحرص كل واحد منهما على حقه مع التفريط في واجبه، ولا أن تكون عينه على ما يستحق، وينسى ما هو واجب عليه، فذلك إنكار وجحود. بل يجب أن يكون هم الواجب في قلب أحد الطرفين أكثر من الاهتمام بحقه.

يقول الله تعالى:

﴿وَلَهُنَّ مِثْلُ اُ۬لذِے عَلَيْهِنَّ بِالْمَعْرُوفِۖ﴾[11].

وهكذا تكون المعاشرة بالمعروف أصلاً في اجتماع الزوج والزوجة، لتسري في الأسرة كلها، كما سنرى  في الخطبة المقبلة بحول الله.

ألا فاتقوا الله، عباد الله، وأدوا حق الأزواج والزوجات بالمعروف، وأكثروا من الصلاة والتسليم على معلم الناس الخير أكرمِهم لأهله، وأحسنِهم خلقا مع الناس أجمعين، فاللهم صل وسلم على سيدنا محمد، عدد خلقك ورضى نفسك وزنة عرشك ومداد كلماتك. وارض اللهم عن خلفائه الراشدين المهديين: أبي بكر وعمر وعثمان وعلي، وعن باقي الصحابة من المهاجرين والأنصار، ومن تبعهم واقتفى أثرهم إلى يوم الدين.

وانصر اللهم من وليته أمر عبادك، وبسطت يده في أرضك وبلادك، مولانا أمير المؤمنين صاحب الجلالة الملك محمدا السادس نصرا عزيزا تعز به الدين، وترفع به راية الإسلام إلى يوم الدين.

 اللهم بارك له في الصحة والعافية، واحفظه بسر كتابك وألطافك الخفية، وأقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولانا الحسن، وشد أزره بشقيقه السعيد الأمير الجليل مولانا رشيد، وبباقي أفراد الأسرة الملكية الشريفة إنك سميع مجيب.

وارحم اللهم بواسع رحمتك الملكين الجليلين مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجعلهما في مقعد صدق عندك.

اللهم جَمِّلْنا بأحسن الأخلاق، وجَنِّبْنا سيئها، ربنا هب لنا من أزواجنا وذرياتنا قرة أعين، واجعلنا للمتقين أئمة مهتدين، غير ضالين ولا مضلين. اللهم ارحمنا وارحم آباءنا وأمهاتنا وسائر موتانا وموتى المسلمين.

ربنا آتنا من لدنك رحمة وهيئ لنا من أمرنا رشدا. ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار.

سبحان ربك رب العزة عما يصفون، وسلام على المرسلين، والحمد لله رب العالمين.

خطبة منبرية في موضوع:

المعاشرة بالمعروف -«2»-

ليوم: 22 محرم 1447هـ الموافق لـ 18 يوليوز 2025م

الخطبة الأولى

الحمد لله رب العالمين، نحمده جل وعلا على نعمه، ونشكره على آلائه، ونشهد أن لا إله إلا الله وحده لا شريك له، انفرد بالوحدانية والبقاء، وأسس علاقة الإنسان على المعاشرة بالمعروف والنقاء، ونشهد أن سيدنا محمدا عبده ورسوله، أكرم الناس عشرة، وأطيبهم صحبة، من رآه من بعيد هابه، ومن عاشره أحبه، فصلوات ربي وسلامه عليه وعلى آله الطيبين الأكرمين، وعلى صحابته الغر الميامين، والتابعين لهم بإحسان إلى يوم الدين.

أما بعد؛ أيها الإخوة المؤمنون والأخوات المؤمنات، فإن من اهتمامات العلماء الكبرى من خلال «خطة تسديد التبليغ»، التركيزَ على حسن المعاشرة بين أفراد المجتمع، وخصوصا داخل الأسر والبيوت، تنزيلا لما جاء في البيان القرآني والهدي النبوي من الأمر بالمعاشرة الحسنة. كقوله تعالى:

﴿وَعَاشِرُوهُنَّ بِالْمَعْرُوفِۖ﴾[1].

وقول النبي ﷺ:

"وخالق الناس بخلق حسن"[2].

عباد الله؛ لقد أكدت الخطبة الماضية على موضوع المعاشرة بالمعروف بين الأزواج، وأنها الأساس السليم لبناء الأسرة المستقرة على أركان السكينة والمودة والرحمة والفضل. مع ما تثمر من العدل والإنصاف والإحسان والإيثار والتفاني في خدمة الطرف الآخر.

واليوم نذكر أن من المعاشرة بالمعروف، أن تمتد ظلال الرحمة والمحبة الوارفة على جميع أفراد الأسرة. قال رسول الله ﷺ:

"خيركم خيركم لأهله، وأنا خيركم لأهلي"[3].

فالمسلم مطالب بمعاشرة والديه بالمعروف على قدر وسعه وإحسانه، أن يسعهم بخلقه وكلمته الطيبة، وقوله اللين قبل عطائه وماله. وحقهم بعد حق الله تعالى مباشرة في الإحسان والشكر، كما في قوله تعالى:

﴿وَقَض۪يٰ رَبُّكَ أَلَّا تَعْبُدُوٓاْ إِلَّآ إِيَّاهُ وَبِالْوَٰلِدَيْنِ إِحْسَٰناًۖ﴾[4]

. وقوله جل ذكره:

﴿أَنُ اُ۟شْكُرْ لِے وَلِوَٰلِدَيْكَۖ﴾[5].

والمسلم كذلك مطالب بالمعاشرة الحسنة لزوجته وأبنائه، فهم أهله وعماد بيته، وذلك بالقيام بالواجب تجاههم بالمحبة أولا ثم بحاجاتهم المادية ثانيا، وعلى كل من الزوج والزوجة أن يكون القدوة للآخر وللأولاد لينا ورحمة ولطفا، وتعليما وتربية، وأن يتحمل المسؤولية في كل ما يلزمه القيام به شرعا لصالح الجميع.

وعلى هذه المسؤولية يمكن أن تقوم هذه المعاشرة على السكن النفسي والمودة والرحمة، والرفق والحماية المعنوية.

كما قال الله تعالى:

﴿وَمِنَ اٰيَٰتِهِۦٓ أَنْ خَلَقَ لَكُم مِّنَ اَنفُسِكُمُۥٓ أَزْوَٰجاٗ لِّتَسْكُنُوٓاْ إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةٗ وَرَحْمَةًۖ اِنَّ فِے ذَٰلِكَ لَأٓيَٰتٖ لِّقَوْمٖ يَتَفَكَّرُونَۖ﴾[6]

عباد الله؛ إن نجاح العلاقات الأسرية يكون وفق قواعد الاحترام المتبادل، وكذا مبادئ الحياء، وقيم الوفاء ثم التسامح في الأخطاء، فهو جزء عظيم من عافية الأسر وسلامتها، وهو خلق الكرام، وبذلك تسعد الأسرة وتعيش حياة طيبة، وتكون مكونا صالحا في المجتمع.

بارك الله لي ولكم في القرآن والسنة، وهداني وإياكم إلى ما فيه خير الدنيا والآخرة، وآخر دعوانا أن الحمد لله رب العالمين.

 

الخطبة الثانية

الحمد لله ولي الصالحين، والصلاة والسلام على إمام الأنبياء والمرسلين، سيدنا محمد وعلى آله وصحبه أجمعين.

أيها الإخوة المؤمنون والأخوات المؤمنات؛ ينبغي للمسلم كذلك أن يعاشر أقاربه بالمعروف، وهم أولى بعد والديه وزوجته وأبنائه ببره وإحسانه، لقول الله تعالى:

﴿وَاعْبُدُواْ اُ۬للَّهَ وَلَا تُشْرِكُواْ بِهِۦ شَيْـٔاٗۖ وَبِالْوَٰلِدَيْنِ إِحْسَٰناٗ وَبِذِے اِ۬لْقُرْب۪يٰ وَالْيَتَٰم۪يٰ وَالْمَسَٰكِينِ وَالْج۪ارِ ذِے اِ۬لْقُرْب۪يٰ وَالْج۪ارِ اِ۬لْجُنُبِ وَالصَّٰحِبِ بِالْجَنۢبِ وَابْنِ اِ۬لسَّبِيلِ وَمَا مَلَكَتَ اَيْمَٰنُكُمُۥٓۖ إِنَّ اَ۬للَّهَ لَا يُحِبُّ مَن كَانَ مُخْتَالاٗ فَخُوراًۖ﴾[7].

لقد جعل الله تعالى في الآية الكريمة التوحيد أساساً، وجعل من أهم تطبيقات ذلك العناية بذوي القربى وهم أقرب الناس إليك، وأولاهم بعطفك وإحسانك وعطائك،

ف"اليد العليا خير من اليد السفلى وابدأ بمن تعول"[8] 

ثم من يليهم من اليتامى والمساكين والجيران وابن السبيل، كما فصلتهم الآية الكريمة السابقة.

وختمت الآية بقوله تعالى:

﴿إِنَّ اَ۬للَّهَ لَا يُحِبُّ مَن كَانَ مُخْتَالاٗ فَخُوراًۖ﴾.[9]

لبيان أن الكبر والخيلاء والافتخار ليس من أخلاق المؤمن، ولا من المعاشرة بالمعروف المطلوب شرعا، وذلك لما تفضي إليه من قطيعة الأقارب خاصة، والناس عامة.

عباد الله؛ إن المذاهب السياسية والاجتماعية في عصرنا الحاضر، لها تصورات مختلفة للأسرة يدور عليها التنافس، ومن تأمل في هذه شريعة الإسلام في ما يتعلق بالأسرة سيدرك أن القيم المطلوبة في الكتاب والسنة هي المخرج للإنسانية في هذا الباب، وعندما نتحدث عن الكتاب والسنة فعلينا أن ننتبه إلا أن عددا من العوائد والتصورات الخاطئة تتحكم في سلوك العلاقة مع الرجل وهي ليست من الكتاب ولا من السنة إذا خرجت عن الحق والمساواة والمرحمة.

ألا فاتقوا الله، عباد الله، وأصلحوا ذات بينكم، واعلموا أن المعاشرة الحسنة من أسباب السعادة في الدنيا والفوز في الآخرة، وأن قطيعة الرحم من أسباب الشقاء وعدم المغفرة وعدم قبول الأعمال.

هذا ولنجعل مسك الختام، أفضلَ الصلاة وأزكى السلام، على سيد الورى وشفيع الأنام، سيدنا محمد، اللهم صل وسلم على سيدنا محمد بما هو أهله، وصل وسلم على سيدنا محمد حق قدره ومقداره العظيم.

وارض اللهم عن آله الطيبين وأزواجه الطاهرات أمهات المؤمنين، وعن الصحابة أجمعين، المهاجرين منهم والأنصار والتابعين لهم في حسن المعاشرة قولا وفعلا وأخلاقا.

وانصر اللهم من وليته أمر عبادك، وبسطت يده في أرضك وبلادك، مولانا أمير المؤمنين جلالة الملك محمدا السادس، نصرا تعز به الدين، وترفع به راية الإسلام والمسلمين، واحفظه اللهم بحفظ كتابك، وأقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولاي الحسن، وشد أزره بشقيقه السعيد، صاحب السمو الملكي الأمير الجليل مولاي رشيد، وبباقي أفراد الأسرة الملكية الشريفة، إنك سميع مجيب.

وارحم اللهم الملكين المجاهدين، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، في أعلى عليين.

اللهم كما حسنت خلقنا فأحسن خلقنا وقنا عذاب النار، اللهم استر عوراتنا، وآمن روعاتنا، واسترنا بسترك الجميل. وارحمنا وارحم آباءنا وأمهاتنا وسائر موتانا وموتى المسلمين. ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار.

تكريم المرأة في الإسلام

الحمد لله رب العالمين، نحمده سبحانه وتعالى على التكريم والتفضيل، وهو القائل:

وَلَقَدْ كَرَّمْنَا بَنِےٓ ءَادَمَ وَحَمَلْنَٰهُمْ فِے اِ۬لْبَرِّ وَالْبَحْرِ وَرَزَقْنَٰهُم مِّنَ اَ۬لطَّيِّبَٰتِ وَفَضَّلْنَٰهُمْ عَلَىٰ كَثِيرٖ مِّمَّنْ خَلَقْنَا تَفْضِيلاٗۖ([1]

ونشهد أن لا إله إلا الله وحده لا شريك له، ونشهد أن سيدنا محمدا عبده ورسوله، القائل صلى الله عليه وسلم:

«استوصوا بالنساء خيرا»[2]

صلى الله عليه وسلم صلاة وسلاما تامين دائمين بدوام ملك الله. وعلى آله الطيبين الطاهرين، وصحابته الغر الميامين، ومن تبعهم وسلك نهجهم القويم إلى يوم الدين.

أما بعد؛ معاشر المؤمنين والمؤمنات، فيقول الله تعالى في معرض الامتنان والتذكير بمسؤولية الإنسان:

]يَٰٓأَيُّهَا اَ۬لنَّاسُ اتَّقُواْ رَبَّكُمُ الذِے خَلَقَكُم مِّن نَّفْسٖ وَٰحِدَةٖ وَخَلَقَ مِنْهَا زَوْجَهَا وَبَثَّ مِنْهُمَا رِجَالاٗ كَثِيراٗ وَنِسَآءٗۖ وَاتَّقُواْ اُ۬للَّهَ اَ۬لذِے تَسَّآءَلُونَ بِهِۦ وَالَارْحَامَۖ إِنَّ اَ۬للَّهَ كَانَ عَلَيْكُمْ رَقِيباٗۖ([3].

عباد الله؛ لقد كرم الله تعالى المرأة في الإسلام وبين بيانا شافيا في كتابه وعلى لسان نبيه صلى الله عليه وسلم أنها أخت الرجل في الأحكام، وقرينته في استحقاق الحقوق وتحمل الواجبات، وأنهما أمام خطاب الشرع سواء.

وزادها الله تعالى تكريما خاصا في مظاهر عدة، نذكر منها:

أولا: حمايتها من مظالم الجاهلية التي سلبتها كثيرا من حقوقها، فقد كانت المرأة في الجاهلية تورث كما يورث المتاع، وتحرم من حقها في الإرث والزواج وغير ذلك، فقال الحق سبحانه مدافعا عن حقها في ذلك كله:

 ]يَٰٓأَيُّهَا اَ۬لذِينَ ءَامَنُواْ لَا يَحِلُّ لَكُمُۥٓ أَن تَرِثُوا اُ۬لنِّسَآءَ كَرْهاٗۖ وَلَا تَعْضُلُوهُنَّ لِتَذْهَبُواْ بِبَعْضِ مَآ ءَاتَيْتُمُوهُنَّ([4].

قال ابن عباس رضي الله عنه:

كانوا في الجاهلية إذا مات الرجل كان أولياؤه أحق بامرأته؛ إن شاؤوا تزوّجها أحدهم، وإن شاؤوا زوَّجوها من غيرهم، وإن شاؤوا منعوها التزوُّج، فنزلت الآية في ذلك"[5].

والعضل في الآية؛ هو منع المرأة من الزواج من أجل استغلالها والاستحواذ على ثروتها. فحرم الله ذلك وجعل لها نصيبها من الإرث تتصرف فيه كما تشاء، وأعطاها الحق في التملك مثل الرجل سواء بسواء.

وعلى هذا لا يجوز لأحد رجلا كان أو امرأة أن يمنع بنته أو أخته من الزواج طمعا في أجرتها أو ميراثها أو مالها أيا كان مصدره. كما حرم الله تعالى وأْد البنات، أي دفنهن حيات، وعقوق الأمهات، لقول الرسول صلى الله عليه وسلم:

«إن الله حرم عليكم عقوق الأمهات، ومنعاً وهات، ووأد البنات، وكره لكم: قيل وقال، وكثرة السؤال، وإضاعة المال»[6].

ثانيا: التخفيف عنها، فمما خص الإسلام به المرأة التخفيفُ عنها في أمور كثيرة، منها: تراخيص زمن حيضتها، ولها من الأجر في كل ذلك مثل ما للرجل من غير أن ينقص من أجرها شيئا؛ وذلك إكراما لها من أجل الرسالة التي تتحملها من الحمل والولادة والرضاع وأعباء التربية التي لا يطيقها الرجل بحال.

ثالثا: التنويه بما تتحمله المرأة من المسؤوليات الأسرية والاجتماعية، كما قال الله تعالى:

]وَوَصَّيْنَا اَ۬لِانسَٰنَ بِوَٰلِدَيْهِۖ حَمَلَتْهُ أُمُّهُۥ وَهْناً عَلَىٰ وَهْنٖۖ وَفِصَٰلُهُۥ فِے عَامَيْنِۖ أَنُ اُ۟شْكُرْ لِے وَلِوَٰلِدَيْكَۖ إِلَيَّ اَ۬لْمَصِيرُۖ([7].

فقد وصَّى الحق سبحانه في هذه الآية ببر الوالدين معا، ثم خص الأم بالتذكير بما أصابها من التعب والألم من أجل الحمل والوضع والرضاع، حتى يستشعر الناس حقوقها العظيمة على المجتمع عامة والأسرة خاصة.

رابعا: أن الله تعالى أوجب لها النفقة في حياتها كلها، على أبيها بنتا وعلى زوجها زوجة وعلى أولادها أما وعلى ذوي رحمها وقرابتها ثم على المجتمع، إذا لم يكن لها أحد من هؤلاء، وذلك صونا لكرامتها وحفظا لعرضها من الامتهان.

وهكذا إخوة الإيمان، أكرم الله تعالى المرأة في نصوص كثيرة، وأوجب لها العناية الكافية عملا بما تزخر به الآيات الكريمة والأحاديث النبوية، وما تمثله مواقف كثيرة من السيرة النبوية الشريفة.

نفعني الله وإياكم بقرآنه المبين، وبحديث سيد الأولين والآخرين، وآخر دعوانا أن الحمد لله رب العالمين.

 الخطبة الثانية

الحمد لله الكريم المنان، المتفضل على عباده بمحض الفضل والإحسان، والصلاة والسلام على نبيه المصطفى من ولد عدنان، وعلى آله وذريته وصحابته وكل من اتبعه في السر والإعلان.

أيها الإخوة المؤمنون والأخوات المؤمنات؛ ومن تكريم الله تعالى للمرأة في الإسلام الاعتراف بجهودها المختلفة في خدمة الدين الإسلامي عبر التاريخ، فقد ذكر سبحانه في القرآن الكريم على سبيل التنويه والثناء: مريم ابنة عمران، وآسية امرأة فرعون، وحنة امرأة عمران، وأم موسى وغيرَهن، ونوه بإيمانهن وتعلقهن بالله تعالى والعمل بمقتضى شرعه.

كما نوَّه بأمهات المؤمنين ورفع مكانتهن لمنزلتهن من الرسول صلى الله عليه وسلم، فقال سبحانه:

 ]يَٰنِسَآءَ اَ۬لنَّبِےٓءِ لَسْتُنَّ كَأَحَدٖ مِّنَ اَ۬لنِّسَآءِ انِ اِ۪تَّقَيْتُنَّۖ( [8]

فهذه أم سلمة رضي الله عنها، قالت يا رسول الله، يذكر الرجال بالهجرة والجهاد ولا يذكر النساء؟ فأنزل الله تعالى:

]اِنَّ اَ۬لْمُسْلِمِينَ وَالْمُسْلِمَٰتِ وَالْمُومِنِينَ وَالْمُومِنَٰتِ وَالْقَٰنِتِينَ وَالْقَٰنِتَٰتِ وَالصَّٰدِقِينَ وَالصَّٰدِقَٰتِ([9].

 كما أنزل سبحانه في الموضوع نفسه:

]فَاسْتَجَابَ لَهُمْ رَبُّهُمُۥٓ أَنِّے لَآ أُضِيعُ عَمَلَ عَٰمِلٖ مِّنكُم مِّن ذَكَرٍ اَوُ ا۟نث۪ىٰۖ بَعْضُكُم مِّنۢ بَعْضٖۖ([10].

فبين الحق سبحانه وتعالى أنه لا يضيع أجر من أحسن عملا، وإن كان الخطاب للتذكير في غالب القرآن، فإنه من باب التغليب والاختصار، وليس من باب التمييز والاحتقار.

وهكذا، إخوة الإيمان؛ نصر الإسلام المرأة، ونصرتْ المرأة الإسلام وخَدمته، كما فعلت أم المؤمنين خديجة الطاهرة العفيفة أول من أسلم وآمن بالرسول صلى الله عليه وسلم، وأم سلمة الراوية، وعائشة الفقيهة، وحفصة الحافظة، وزينب المنفقة في سبيل الله رضي الله عنهن، وكلّ واحدة منهن وما ميزها الله به من خصال البر والإحسان.

وعلى أثرهن سارت النساء المؤمنات في هذا البلد المبارك، فنافسن الرجال في بناء المساجد وحفظ القرآن وإشاعة روح التضامن والتكافل، ونشر العلم والثقافة المسئولة، وكن مدارس للتربية والتنشئة على المكارم والفضائل.

فكان فضلها على المجتمع كبيرا، مما يوجب على الجميع تقدير جهدها وحسن معاملتها والاعتراف بجميل صنيعها، امتثالا لقول النبي صلى الله عليه وسلم:

 «أكمل المؤمنين إيمانا أحسنهم خلقا، وخياركم خياركم لنسائكم»[11].

أيها المؤمنون، ما أكرم المرأة شرع ولا اجتهاد بشري مثلما أكرمها القرآن، وكان سباقا إلى ذلك في عصور كان لا يُعترف للمرأة حتى بانتمائها للإنسانية. أما في عصرنا هذا فقد شكك المغرضون في هذه المكانة محتجين بمعاملات تعامل بها المرأة في بلاد المسلمين، وما هي إلا تصرفات جاهلية لم تُصحح أو سلوكات أنانية من بعض الرجال لا يجوز أن تنسب إلى دين الإسلام، دين المساواة.

ولا بد أن نستحضر أن مسألة الحياء هي مسئولية الرجل ومسئولية المرأة، وقد أمر الله تعالى المؤمنين بغض البصر ثم أمر المؤمنات، وهذه المسئولية تتوقف على تربية الأولاد والبنات برعاية الأسر.

هذا، وأكثروا من الصلاة والسلام على سيد الورى وشفيع الأنام سيدنا محمد، اللهم صل وسلم على سيدنا محمد، عدد خلقك، ورضى نفسك، وزنة عرشك، ومداد كلماتك، وارض اللهم عن خلفائه الراشدين؛ أبي بكر وعمر وعثمان وعلي، وعن باقي الصحب أجمعين. وعن التابعين وتابعيهم في كل وقت وحين.

وانصر اللهم من وليته أمر عبادك، وبسطت يده في أرضك وبلادك، مولانا أمير المؤمنين صاحب الجلالة الملك محمدا السادس نصرا عزيزا تعز به دينك وأولياءك من عبادك، اللهم أسبغ عليه أردية الصحة والعافية، وابسط عليه ألطافك الخفية، وأقر عين جلالته بولي عهده المحبوب، صاحب السمو الملكي الأمير الجليل مولانا الحسن، مشدود الأزر بصنوه السعيد، الأمير الجليل مولانا رشيد، وبباقي أفراد الأسرة الملكية الشريفة.

وتغمد اللهم بواسع رحمتك، وكريم فضلك وجودك، الملكين الجليلين، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجزهما خير ما جزيت محسنا عن إحسانه.

اللهم أصلح أحوالنا في الأمور كلها، وارزقنا بر أمهاتنا، وحسن تربية بناتنا، وحسن معاشرة أزواجنا، وحسن معاملة أخواتنا، واجعلنا جميعا ممن خافك واتقاك، ويرعى حقوق الآخرين سعيا في رضاك.

ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار.

حقوق المرأة في الإسلام 

الحمد لله الذي تولى بيان حقوق العباد بنفسه، وحرم هضمها على خلقه، نحمده تعالى على نعمة الإسلام والإيمان، ونشهد أن لا إله إلا الله العظيم الشأن، ونشهد أن سيدنا محمدا عبد الله ورسوله، ومصطفاه من خلقه وخليله، صلوات ربي وتسليماته عليه ما توالى الليل والنهار، وعلى آله الأطهار، وصحابته الأخيار، وعلى التابعين لهم بإحسان إلى يوم الدين.

أما بعد؛ معاشر المؤمنين والمؤمنات، فقد تناولت الخطبة الماضية تكريم المرأة في الإسلام، بما خصها به من العناية والتنويه؛ لما تتحمله من المسؤوليات الجسام، وتأتي خطبة اليوم لبيان حقوقها التي منحتها إياها شريعة الإسلام، إنصافا لها مما اعتراها من ظلم وحيف في الجاهلية، وإبطالا لما عليه بعض الأعراف المنحرفة عن الدين الحق في بعض المجتمعات.

فعظم الله وجودها في الحياة، وذم الذين يستاؤون من البنت إذا ولدت لهم فقال جل من قائل:

 «وَإِذَا بُشِّرَ أَحَدُهُم بِالُانثىٰ ظَلَّ وَجْهُهُ مُسْوَدّاً وَهُوَ كَظِيمٌ  يَتَوَٰرىٰ مِنَ اَ۬لْقَوْمِ مِن سُوٓءِ مَا بُشِّرَ بِهِ أَيُمْسِكُهُ عَلَىٰ هُونٍ اَمْ يَدُسُّهُ فِي اِ۬لتُّرَابِۖ أَلَا سَآءَ مَا يَحْكُمُونَۖ» [1].

 ومدح من كانت له بنات فأحسن إليهن، ووعده بالجنة قطعا فقال ﷺ:

«من كان له ثلاث بنات، يؤويهن، ويكفيهن، ويرحمهن، فقد وجبت له الجنة البتة».

فقال رجل من بعض القوم: وثنتين، يا رسول الله؟ قال:

«وثنتين»[2].

فحق البنات في التربية وكفاية حاجتهن عظيم؛ وهن ستر من النار لمن قام بحقهن وبإكرامهن؛ وبحسن تربيتهن تحصل صحبة ومرافقة رسول الله ﷺ في الجنة.

كما أوجب الإسلام حق الأم وقدمه على حق الأب، كما في قول النبي ﷺ، لمن سأله: يا رسول الله، من أحق الناس بحسن صحابتي؟ فقال:

«أمك قال ثم من؟ قال: "أمك" قال ثم من؟ قال: "أمك" قال ثم من؟ قال: "أبوك"» [3].

فقد أعطى النبي ﷺ ثلاثة أرباع البر للأم، وأعطى للأب ربعا واحدا.

قال القاضي عياض رحمه الله: "فيه تأكيد حق الأم وأمانة مبرتها على مبرة الأب؛ لكثرة تكلفها له من الحمل، ومشقة الوضع، ومعاناة الرضاع والتربية"[4].

وأوجب كذلك حق الزوجة، في المعاشرة الحسنة والصداق والنفقة والسكنى، وغير ذلك مما سبق الحديث عنه في خطبة سابقة. وأوصى بالرفق بها وبناء العلاقة الزوجية على المكارمة، وعلى الفضل والاعتراف بالجميل وليس على المكايسة.

كما أعطى الشارع الحكيم للأخت حقها كاملا في الأخوة والصلة، والمعاملة بالمثل مع إخوانها الذكور، وعدم حرمانها من الإرث، كما يحدث للأسف عند بعض من لا يفقهون من الشريعة شيئا، فيحرمون أخواتهم المتزوجات من الإرث، ويعتبرون طلبَها حقَّها من قلة الأدب ومن أسباب قطيعة الرحم، وهم أولى بهذا اللوم.

ألا فاتقوا الله، عباد الله، وامتثلوا أمره ونهيه في التعامل مع ذوي القربى والأرحام، واعلموا أن الله تعالى سائل كل واحد منا عما استرعاه حفظ أم ضيع.

نفعني الله وإياكم بقرآنه المبين وبحديث سيد الأولين والآخرين، وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله الملك الحق المبين، والصلاة والسلام على إمام الأنبياء والمرسلين، وعلى آله وصحبه أجمعين.

عباد الله؛ ومن حقوق المرأة في الإسلام حقها في المشورة وإبداء الرأي، في الشؤون الخاصة والعامة، لقول الله تعالى:

«فَإِنَ اَرَادَا فِصَالاً عَن تَرَاضٍ مِّنْهُمَا وَتَشَاوُرٍ فَلَا جُنَاحَ عَلَيْهِمَا»[5].

فهذه الآية الكريمة شرعت المشاورة بين الزوجين في شأن فطام مولودهما للوصول إلى الحالة الفضلى للطفل مع احترام حق كل منهما.

ومن ذلك في الشأن العام استشارة النبي لأم سلمة رضي الله عنها يوم الحديبية، لما أمر الصحابة أن يتحللوا من عمرتهم، فأبوا لكونهم لم يصلوا إلى مكة ولم يطوفوا ولم يسعوا، فغضب النبي ﷺ لذلك. فأشارت عليه أم سلمة رضي الله عنها، أن لا يكلمهم وأن ينحر هديه ويحلق رأسه. فلما رأوه ﷺ فعل ذلك، تتابعوا في نحر الهدي والحلق، ونجاهم الله من المخالفة بسبب إشارة أم سلمة وحكمتها رضي الله عنها.

وفي هذا ما يكذب دعوى أن المرأة لا تستشار، أو ما اشتهر على ألسنة الناس من قولهم: "شاوروهن وخالفوهن". وهذا ليس بحديث بل هو كلام باطل مكذوب على النبي ﷺ.

ومن حق المرأة كذلك التملك والتصرف في مالها بيعا وشراء وتبرعا كتصرف الرجل تماما.

ومن حقوقها كذلك حقها في العمل والكسب واعتلاء المناصب المختلفة، والمشاركة في تدبير الشأن العام. وحقوق أخرى لا يتسع المقام لذكرها، وفيما ذكر الكفاية.

وقد أكدت التجارب اليوم أن المرأة أعطت نتائج باهرة في جميع الميادين.

وبالعودة إلى العهد النبوي الزاهر وعهد الصحابة الكرام، نجد أن دور المرأة كان كبيرا في جميع مجالات الحياة، حيث حققن نتائج جليلة في خدمة الدين والأمة، فمنهن الطبيبات، والفقيهات، والمحدثات، والحافظات، والمحتسبات، والمجندات، وغير ذلك من الوظائف والمهن.

ألا فلنتق الله تعالى، رجالا ونساء، ولنتمسك بهدي السلف الصالح من هذه الأمة، فالخير كله في اتباع تعاليم القرآن والسنة، فإنه لن يصلح آخر هذه الأمة إلا بما صلح به أولها، كما قال الإمام مالك رحمه الله.

هذا، وأكثروا من الصلاة والتسليم على ملاذ الورى وشفيع الأنام، سيدنا محمد، اللهم صل وسلم على سيدنا محمد، وعلى آل سيدنا محمد، كما صليت وسلمت على سيدنا إبراهيم، وعلى آل سيدنا إبراهيم، وبارك على سيدنا محمد، وعلى آل سيدنا محمد، كما باركت على سيدنا إبراهيم، في العالمين، إنك حميد مجيد.

وارض اللهم عن ساداتنا الحنفاء، الأربعة الخلفاء؛ أبي بكر وعمر وعثمان وعلي، وعن الصحابة الكرام من المهاجرين والأنصار، وعن التابعين لهم بإحسان إلى يوم الدين. وعنا معهم برحمتك يا أرحم الراحمين يا رب العالمين.

وانصر اللهم عبدك الخاضع لجلالك وسلطانك، المؤيد بفضلك وامتنانك، مولانا أمير المؤمنين صاحب الجلالة الملك محمدا السادس، نصرا تعز به الدين، وتعلي به راية الإسلام إلى يوم الدين.

اللهم أسبغ عليه أردية الصحة والعافية، واحفظه اللهم بحفظ كتابك في السر والعلانية، وأقر عين جلالته بولي عهده المحبوب، صاحب السمو الملكي الأمير الجليل مولانا الحسن، وشد أزره بشقيقه السعيد، مولانا رشيد، وبباقي أفراد الأسرة الملكية الشريفة، إنك سميع مجيب.

وارحم اللهم بواسع رحمتك الملكين الجليلين، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، مع المنعم عليهم من النبيئين، والصديقين والشهداء والصالحين.

اللهم ألف بين قلوبنا وأصلح ذات بيننا، واجعلنا هداة مهديين، غير ضالين ولا مضلين، ربنا هب لنا من أزواجنا وذرياتنا قرة أعين، واجعلنا من الذين يستمعون القول فيتبعون أحسنه.

ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار.

سبحان ربك رب العزة عما يصفون وسلام على المرسلين والحمد لله رب العالمين.

 "الحث على أداء حقوق الغير والتحذير من إضاعتها"

الحمد لله حق حمده، جعل الحقوق متبادلة بين عباده أجمعين، وأوصى بها في كتابه المبين وعلى لسان رسوله الأمين، نحمده جل وعلا، ونشهد أن لا إله إلا الله شهادة صدق ويقين، ونشهد أن سيدنا محمدا عبده ورسوله المصطفى الأمين، صلى الله وسلم عليه وعلى آله الأخيار الطيبين، وعلى الصحابة الأبرار الميامين، وعلى التابعين لهم في أداء الحقوق والمحافظة عليها في سائر الأمصار والأعصار وفي كل وقت وحين.

أما بعد؛ أيها الإخوة المؤمنون والأخوات المؤمنات،

إن مما تهدف إليه "خطة تسديد التبليغ" تذكير الناس بما يجب من ترسيخ مبدأ أداء الواجبات قبل المطالبة بالحقوق، فبالحرص عليه تكون النفوس مطمئنة، وتعيش على أساسه حياة طيبة كما وعدها الله في محكم تنزيله؛ وأداء حقوق الغير من الواجبات الدينية الكبرى التي نصت عليها الأحاديث النبوية، كما في قول النبي صلى الله عليه وسلم:

«أدِّ الأمانة إلى من ائتمنك ولا تخن من خانك»[1].

فمن حق المسلم على المسلم أداء الأمانة وعدم الخيانة، حتى ولو تَعرَّض لها ممن لا يخاف الله، إذ ليس من الإسلام ولا من المروءة معاملة المسيء بالمثل، وإنما معاملته بالحسنى، كما قال جل وعلا:

 «وَلَا تَسْتَوِے اِ۬لْحَسَنَةُ وَلَا اَ۬لسَّيِّئَةُ ادْفَعْ بِالتِے هِيَ أَحْسَنُ فَإِذَا اَ۬لذِے بَيْنَكَ وَبَيْنَهُۥ عَدَٰوَةٌ كَأَنَّهُۥ وَلِيٌّ حَمِيمٌ»[2].

ومن المعاملة الحسنة في الأخذ والعطاء أداء الحقوق والقيام بالواجبات وذلك من أهم خصال الإسلام بعد التوحيد وأداء الأركان.

روى البخاري وغيره أن الرسول صلى الله عليه وسلم آخى بين سلمان الفارسي وأبي الدرداء، فكان أبو الدرداء رضي الله عنه يسرد الصيام، ويتابع القيام. فقال له سلمان:

«إن لنفسك عليك حقا، ولربك عليك حقا، ولضيفك عليك حقا، وإن لأهلك عليك حقا، فأعط كل ذى حق حقه. فأتيا النبي صلى الله عليه وسلم فذكرا ذلك. فقال له:

« صدق سلمان»[3].

في هذا الحديث ذكر سلمان الفارسي رضي الله عنه، مجموعة من حقوق الغير، وأقره النبي صلى الله عليه وسلم، على ذلك بقوله: "صدق سلمان".

من هذه الحقوق حق الله تعالى في العبادة والإخلاص فيها، مع ما يقتضي ذلك من العمل الصالح والإتقان فيه، ومنها حق النفس في الراحة وعدم إرهاقها وحملها على ما لا تطيق، ومنها حق الضيف من الإكرام وحسن ضيافته على قدر المستطاع، ومنها حق الأهل في المعاشرة بالمعروف، والنفقة والسكنى وغير ذلك من الحقوق المبسوطة في محلها، وختم رضي الله عنه هذه المذكورات على سبيل التمثيل بقوله: "فأعط لكل ذي حق حقه". فجعلها قاعدة تقال على سبيل التوصية بأداء حقوق الغير: (أعط لكل ذي حق حقه).

وأنواع الحقوق المترتبة على الذمم متعددة ومتنوعة، منها حقوق معنوية كحسن الظن بالناس، واحترامهم، ومعاملتهم بالحسنى، وستر أعراضهم وعوراتهم، وذكرهم بالجميل، ومنها حقوق مادية؛ كحقوقهم المترتبة على بعضهم في البيع والشراء والجوار والزواج وسائر المعاملات، فيجب الوفاء بها حسب المتفق عليه بين الطرفين المتعاملين بها، ثم حقوق المجتمع والوطن، ويظهر ذلك في حب الوطن وأداء حقوقه المادية والمعنوية، والتفاني في خدمته، والسعي في تنميته، كل في موقعه ومسؤوليته، وعدم السماح بالنيل منه من أي كان، ووجوب الدفاع عنه والاستماتة في حمايته في سائر الأحوال.

ومسك ختام الحقوق؛ حق ولي الأمر مولانا أمير المؤمنين في الوفاء له بالبيعة والسمع والطاعة والمحبة له، وجمع الكلمة حوله، والسير في ركابه في المنشط والمكره، والدعاء له بالنصر والتمكين.

يقول الفضيل بن عياض والحسن البصري وغيرهم من علماء الأمة وأولياؤها،

"لو أن لي دعوة مستجابة لجعلتها للسلطان؛ إذ بصلاحه صلاح البلاد والعباد"[4].

عباد الله؛ هكذا فهم الصحابة رضي الله عنهم، ومن تبعهم بإحسان حقيقة الإسلام، وعملوا على هذا الأساس، في جعل حياتهم عبادةً في كل ما يأتون وما يذرون، ولا يتركون أحدا منهم يختزل العبادة في مظاهر الصلاة والصيام ونحوهما، بل ينبهونه كما فعل سلمان رضي الله عنه، على الإسلام المتوازن في إسداء الحقوق لأربابها، فعاشوا بذلك حياة طيبة، ملؤها النصح والتواصي بالحق والتواصي بالصبر.

بارك الله لي ولكم في القرآن الكريم، وغفر لي ولكم ولسائر المسلمين، وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله ولي الصالحين، والصلاة والسلام على إمام المتقين، وحجة الله على العالمين، سيدنا محمد وعلى آله وصحبه أجمعين.

عباد الله؛ مما سبقت الإشارة إليه ندرك أن الحقوق متبادلة بين العباد، وأنه يجب على كل واحد منا أداء ما أسند إليه من الحقوق على وجه اللزوم، فيما بينه وبين والديه، وبينه وبين أهله، وبينه وبين أقاربه، وبينه وبين جيرانه، وتتسع الدائرة حتى تسع الناس جميعا. كما قال الحق سبحانه:

«وَاعْبُدُواْ اللَّهَ وَلَا تُشْرِكُواْ بِهِۦ شَيْئاً وَبِالْوَٰلِدَيْنِ إِحْسَٰناً وَبِذِے اِ۬لْقُرْب۪ىٰ وَالْيَتَٰم۪ىٰ وَالْمَسَٰكِينِ وَالْج۪ارِ ذِے اِ۬لْقُرْب۪ىٰ وَالْج۪ارِ اِ۬لْجُنُبِ وَالصَّٰحِبِ بِالْجَنۢبِ وَابْنِ اِ۬لسَّبِيلِ وَمَا مَلَكَتَ اَيْمَٰنُكُمُۥٓ إِنَّ اَ۬للَّهَ لَا يُحِبُّ مَن كَانَ مُخْتَالاً فَخُوراً»[5].

فلم تترك هذه الآية أحدا من الناس، بعد حق الله تعالى في العبادة والإخلاص فيها، إلا أدخلته مسلما كان أو غيره وأعطته حقه في الإحسان إليه والبرور به.

ومن أهم ما تجب التوصية به، والحرص على القيام به على أحسن وجه وأكمله، ما أسند إلى كل واحد منا من المسؤوليات والمهام، فهي من الحقوق العظام ، فيجب على العلماء توعية الناس وإرشادهم، فهذا حقهم عليهم، كما يجب على المدرسين تعليم أبناء المسلمين، وأن يتقوا الله تعالى فيهم، فيعلموهم ما ينفعهم في دينهم ودنياهم، وعلى أساس ثوابت الأمة واختياراتها، ليكون على أتم الاستعداد لتحمل المسؤوليات في المستقبل، كما يجب على المسؤولين عن صحة المجتمع الوفاء له، والقيام بما يجب القيام به لفائدة صحة المواطنين والمواطنات، بكل إخلاص وتفان، كما يجب على التجار وأرباب الأموال أن يعملوا على أداء الأمانات واجتناب الغش، والبعد عن أكل أموال الناس بالباطل في المعاملات، ويجب على الموظفين في سائر القطاعات العمل بتفان وإتقان ابتغاء مرضاة الله فيما وُكِّل إليهم من المهام، وعلى كل من كان بميدان من ميادين الوطن المادية والمعنوية، أن يحس إحساسا كبيرا بمسؤوليته العظمى في موقعه، حتى يؤديها على أتم وجه وأكمله، ولا تؤتيَنَّ الأمة من قِبَله.

اللهم اجعلنا من الذين يستمعون القول فيتبعون أحسنه، ووفقنا لأداء ما طوق أعناقنا من الحقوق والواجبات، ويسر لنا القيام فيها بما يرضيك يا رب العالمين.

اللهم صل وسلم وبارك على أفضل من عاهد فوفى، سيدنا محمد النبي المصطفى، وعلى آله الطيبين الشرفاء، وصحابته الحنفاء، وخصوصا ساداتنا الخلفاء؛ أبي بكر وعمر وعثمان وعلي، وعن باقي الصحب والتابعين لهم في الإخلاص والوفاء.

وانصر اللهم بنصرك المبين مولانا أمير المؤمنين صاحب الجلالة الملك محمدا السادس، ووفقه اللهم لما تحب وترضى، وأقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولاي الحسن، وشد أزره بشقيقه السعيد، الأمير الجليل مولاي رشيد، وبباقي أفراد الأسرة الملكية الشريفة.

وارحم اللهم بواسع رحمتك وكريم جودك، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجعلهما في مقعد صدق عندك.

وارحم اللهم موتانا وموتى المسلمين، وارحمنا إذا صرنا إلى ما صاروا إليه، اللهم أدِّ عنا لكل ذي حق حقه، فأنت الغني ونحن الفقراء، وأسبغ علينا سوابغ فضلك، فأنت الجواد الكريم تحب الكرماء.

ربنا آتنا من لدنك رحمة وهيىء لنا من أمرنا رشدا.

سبحان ربك رب العزة عما يصفون وسلام على المرسلين والحمد لله رب العالمين.

        body:`بسم الله الرحمن الرحيم

وصلى الله وسلم على سيدنا محمد وآله وصحبه

خطبة ليوم 12 ربيع الأول 1447هـ الموافق لـ 5 سبتمبر 2025م

  تجليات الحياة الطيبة من ميلاد الرسول صلى الله عليه وسلم إلى بعثته

 الحمد لله الذي أنزل علينا خير كتبه، وبعث فينا أفضل رسله، وجعلنا من خير أمة أخرجت للناس، نحمده تعالى على نعمة الإسلام، ونشكره على ما هدانا إليه بمحض الفضل والإنعام، ونشهد أن لا إله إلا الله وحده لا شريك له، ونشهد أن سيدنا محمدا عبد الله ورسوله، أكرم الناس خَلْقا وخُلُقا، وأعظمُهم أمانة وصدقا، صلى الله عليه وسلم ما تجملت الحياة وطابت بعبير سيرته وكريم هديه وحاله، وتعطرت السماء والأرض بذكر جميل شمائله وحميد خصاله، وعلى آله الطيبين المطهَّرين بنسبه ونسبته، وصحابته الكرام المتمسكين بهديه وسنته، وعلى التابعين لهم بإحسان من أهل دينه وملته، إلى يوم الورود على حوضه ونيل شفاعته.

أما بعد؛ أيها الإخوة المؤمنون والأخوات المؤمنات، فإن غاية ما يسمو إليه العلماء في "خطة تسديد التبليغ" هو توجيه الناس إلى الاقتباس من هدي الرسول صلى الله عليه وسلم، والاغتراف من معين ما جاء به من الوحيين كتابا وسنة لهداية البشرية، وإخراجها من الظلمات إلى النور؛ حتى تعيش حياة طيبة كما وعدها الله تعالى بذلك بشَرطيْ الإيمان الصادق والعمل الصالح.

وهذا ما يشير إليه قوله تعالى على سبيل الامتنان والإكرام:

«لَقَدْ جَآءَكُمْ رَسُولٌ مِّنَ اَنفُسِكُمْ عَزِيزٌ عَلَيْهِ مَا عَنِتُّمْ حَرِيصٌ عَلَيْكُم بِالْمُومِنِينَ رَءُوفٌ رَّحِيمٞ»[1].

فالآية الكريمة صريحة في أن الغاية من بعثة الرسول صلى الله عليه وسلم، بعد التوحيد وإخلاص العبادة لله تعالى، هي رفع الحرج والعنت عن الناس، وأن ذلك من مظاهر الرحمة التي بُعِثَ الرسول صلى الله عليه وسلم من أجل بثها ونشرها في الدنيا، وجني ثمارها وجزائها بنيل رضوان الله والجنة في الآخرة.

وهذا ما يسعى العلماء من مقام مسؤوليتهم وأدائهم للواجب المنوط بهم باعتبارهم ورثةَ النبي صلى الله عليه وسلم، ونوابَ أمير المؤمنين وأمناءَ الأمة في القيام بوظائف الرسول صلى الله عليه وسلم، من تلاوة الآيات وتزكية الأنفس وتعليم أحكام الدين من خلال الكتاب والحكمة، كما قال الله تعالى:

«لَقَدْ مَنَّ اَ۬للَّهُ عَلَى اَ۬لْمُومِنِينَ إِذْ بَعَثَ فِيهِمْ رَسُولاٗ مِّنَ اَنفُسِهِمْ يَتْلُواْ عَلَيْهِمُۥٓ ءَايَٰتِهِۦ وَيُزَكِّيهِمْ وَيُعَلِّمُهُمُ الْكِتَٰبَ وَالْحِكْمَةَ وَإِن كَانُواْ مِن قَبْلُ لَفِے ضَلَٰلٖ مُّبِينٍ»[2].

وعيد المولد النبوي الشريف مناسبة لاستجلاء الحياة الطيبة من خلال السيرة النبوية العطرة، والتملي بالشمائل المحمدية الندية، وتثبيت النفوس والقلوب بدلائل النبوة الجلية.

وسيرة النبي صلى الله عليه وسلم العطرة هي المنجم الذي لا ينفد، والكنز الذي لا يفنى، كلما عاد إليها المؤمن يجد فيها حلولا لمشاكله، وأدوية لأمراضه، وراحة وطمأنينة لنفسه. ولنكتف من ذلك اليوم بما يلي:

ميلاد النبي صلى الله عليه وسلم ميلاد أمة، وميلاد رحمة، وميلاد شريعة كلها عدل ورحمة وإنصاف ووفاء، وحياء وحزم وعزم، فما على المؤمن المحب لرسول الله صلى الله عليه وسلم إلا الاتصاف والاقتداء به بما يجعله قدوة لغيره في العبادات والمعاملات.

فقد ظهر مع ميلاده صلى الله عليه وسلم، الخير والبركة، في بيته وبيت حليمة السعديةِ مرضعتِه، وما صاحب ذلك من خصب ورغد عيش، مما جعلها لا تستطيع فراقه صلى الله عليه وسلم لولا الخوف عليه، بسبب ما حدث له من معجزة شق صدره الشريف، وهو في ديار بني سعد.

وهذا ما جعل الناس يرغبون في صحبته والتجارة معه، وتنال أم المؤمنين خديجة رضي الله عنها حظوة الزواج منه صلى الله عليه وسلم، لما رأته من الإرهاصات النبوية التي تدل على أن هذا الرجل سيكون له شأن عظيم.

وبذلك حقق النبي صلى الله عليه وسلم حياة طيبة لنفسه وأهله وأقاربه حتى قبل بعثته رسولا، وكان مثالا يحتذى في خدمة أهله وبلده على الرغم مما كانوا عليه قبل نزول نور النبوة وروح الوحي.

نفعني الله وإياكم بقرآنه المبين وبحديث سيد الأولين والآخرين وآخر دعوانا أن الحمد لله رب العالمين.

الخطبة الثانية

الحمد لله الذي يصطفي من يشاء من عباده لنشر الخير والمحبة والسلام، والصلاة والسلام على إمام المرسلين وشفيع الأنام، سيدنا محمد وعلى آله وصحبته نجوم الهدى وبدور التمام.

عباد الله؛ إن من مظاهر الحياة الطيبة، التي جاء بها الرسول، صلى الله عليه وسلم، ونشرها قبل بعثته، ما كان عليه صلى الله عليه وسلم من كريم الأخلاق كالصدق والأمانة والحياء والوفاء، وغيرها من جميل الشمائل التي تحلى بها صلى الله عليه وسلم، حتى عرف بين الناس بالصادق الأمين، فاستودعوا عنده أماناتهم، واطمأنوا إلى جميل معاشرته وحسن معاملته.

ونستفيد من نهجه صلى الله عليه وسلم أن الدعوة بالحال قبل المقال أفيد وأنجع، وأكثر تأثيرا في الناس وأنفع، مصداقا لقول الله تعالى:

«وَمَنَ اَحْسَنُ قَوْلاٗ مِّمَّن دَعَآ إِلَى اَ۬للَّهِ وَعَمِلَ صَٰلِحاٗ وَقَالَ إِنَّنِے مِنَ اَ۬لْمُسْلِمِينَ»[3].

حيث جعل الله تعالى أحسن أسلوب للتبليغ في الدعوة إلى الله العمل الصالح والقدوة الحسنة والقول الطيب.

ومن تلك المظاهر كذلك ما قالته السيدة خديجة، رضي الله عنها، يوم نزول الوحي على رسول الله صلى الله عليه وسلم، فقال لها: إني خشيت على نفسي، فقالت بكلام الواثق بالله تعالى:

«كلا، والله ما يخزيك الله أبدا، إنك لتصل الرحم، وتحمل الكَلَّ، وتُكسب المعدوم، وتُقري الضيف، وتُعين على نوائب الحق»[4].

ونستفيد من هذا الموقف أن الرسول صلى الله عليه وسلم، كان منشغلا بهموم قومه حاضرا عند نوائب الحق لنصرتها، حاملا ما يثقل على الناس من جليل الخصال: من مساعدة الفقير وقرى الضيف وصلة الرحم، وغيرها من الخصال التي أكد عليها الإسلام بعد نزول الوحي.

والجامع بين هذه الخصال الحميدة أنها في خدمة الغير والإحسان إليه، وهذا ما يحقق الحياة الطيبة للجميع، بنشر المحبة والأخوة بين الناس. وليس ذلك ببعيد عمن اقتدى بالنبي صلى الله عليه وسلم واستن بسنته وهديه القويم.

هذا، وصلوا وسلموا، عباد الله؛ على الهادي الأمين معلم الناس الخير سيدنا محمد، اللهم صل وسلم على سيدنا محمد، عدد ما في علم الله العظيم وأفضاله، والرضى عن خلفائه الراشدين المهديين، أبي بكر وعمر وعثمان وعلي، وعن باقي الصحابة من المهاجرين والأنصار، والتابعين لهم بإحسان إلى يوم الدين.

وانصر اللهم من وليته أمر عبادك، وبسطت يده في أرضك وبلادك، مولانا أمير المؤمنين جلالة الملك محمدا السادس، نصرا عزيزا تعز به الدين، وترفع به راية الإسلام والمسلمين. اللهم احفظه بحفظ كتابك، وأقر عين جلالته بولي عهده المحبوب صاحب السمو الملكي الأمير الجليل مولانا الحسن، وشد أزره بشقيقه السعيد، مولانا رشيد، وبباقي أفراد الأسرة الملكية الشريفة، إنك سميع مجيب.

وارحم اللهم برحمتك الواسعة الملكين الجليلين، مولانا محمدا الخامس، ومولانا الحسن الثاني، اللهم طيب ثراهما، وأكرم مثواهما، واجعلهما في مقعد صدق عندك.

اللهم حبب إلينا الإيمان، وزينه في قلوبنا، وكره إلينا الكفر والفسوق والعصيان، واجعلنا من عبادك الراشدين، اللهم خلقنا بأخلاق نبيك وحبيبك سيدنا محمد، واجعلنا من المتبعين لهديه وسنته، واحشرنا ووالدينا وآباءنا وأمهاتنا في زمرته، وأوردنا حوضه، وارزقنا منه شربة لا نظمأ بعدها أبدا. آمين.

ربنا آتنا في الدنيا حسنة وفي الآخرة حسنة وقنا عذاب النار.

    function renderSermons(){
      const list = $('#sermon-list');
      list.innerHTML = sermons.map((s,idx)=>`
        <div class="item" data-idx="${idx}">
          <div>${s.title}</div>
          <button class="btn ghost" data-view="${idx}">عرض</button>
        </div>
      `).join('');

      // عرض عند الضغط
      $$('#panel-text [data-view]').forEach(btn=>{
        btn.onclick = ()=>{
          const i = +btn.getAttribute('data-view');
          showSermon(i);
        };
      });
      // انقر على الصف كله للعرض
      $$('#panel-text .item').forEach(row=>{
        row.onclick = (e)=>{
          if(e.target.closest('[data-view]')) return;
          const i = +row.getAttribute('data-idx');
          showSermon(i);
        };
      });

      // عرض الأولى افتراضيًا
      if(sermons.length) showSermon(0);
    }

    function showSermon(i){
      const s = sermons[i];
      $('#sermon-meta').textContent = s.meta || '';
      $('#sermon-content').textContent = s.body || '';
    }
    renderSermons();
