<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أوقات الصلاة</title>

  <!-- Police Tajawal -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">



  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(45deg, #E1E6C9, white);
      margin: 0;
      padding: 0;
      direction: rtl;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6 { margin: 0; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 25px;
      background-color: white;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
    }
    .header h1 {
  font-size: 30px;
  font-weight: 700; /* التأكد من أن الوزن 700 موجود في الخط */
  color: #8e9b6f;
  margin: 0;
}

    .back-btn {
      display: inline-block;
      padding: 6px 14px;
      background-color: #c5d8a4;
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0px 3px 6px rgba(0,0,0,0.15);
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    .back-btn:hover { background-color: #6e7656; transform: translateY(-2px); }

    /* City Name */
    #city-name {
      margin-top: 20px;
      text-align: center;
      font-weight: 400;
      font-size: 140px;
      color: black;
    }

    hr {
      border: none;
      border-top: 2px solid #8e9b6f;
      margin: 20px 50px;
    }

    /* Cards */
    .cards-wrapper {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 14px;
      padding: 20px;
    }
    .card {
      width: 150px;
      height: 180px;
      background-color: white;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 44px 1fr;
    }
    .card .header {
      background-color: #8e9b6f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
    }
    .card .body {
      display: grid;
      place-items: center;
      text-align: center;
    }
    .card .body h1 {
      font-size: 36px;
      font-weight: bold;
    }

    /* Select */
    .select-wrapper {
      margin: 40px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .select-wrapper label {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: black;
    }
    select {
      width: 300px;
      height: 40px;
      font-size: 20px;
      font-family: 'Tajawal', sans-serif;
      background: none;
      color: black;
      padding: 5px;
      border-radius: 10px;
      border: 1px solid black;
      text-align: center;
    }

    /* Countdown */
    #countdown {
      text-align: center;
      margin:  0;
      color: #1f3b1f;
      font-size: 26px; 
      font-weight: 600;
    }
    #countdown span {
  display: block;
  font-size: 60px;
  font-weight: 100;   /* ultra light */
  font-family: 'Roboto', sans-serif; /* police très fine */
  color: #222;  
  margin-top: 6px;
  letter-spacing: 2px;
}


    /* Toast */
    #toast {
      visibility: hidden;
      min-width: 250px;
      margin-right: 20px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 1;
      right: 30px;
      bottom: 30px;
      font-size: 18px;
      font-weight: 600;
    }
    #toast.show {
      visibility: visible;
      animation: fadein 0.5s, fadeout 0.5s 2.5s;
    }
    @keyframes fadein {
      from {bottom: 0; opacity: 0;} 
      to {bottom: 30px; opacity: 1;}
    }
    @keyframes fadeout {
      from {bottom: 30px; opacity: 1;} 
      to {bottom: 0; opacity: 0;}
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <h1>أوقات الصلاة</h1>
 


  <button onclick="window.location.href='../dashboard/index.html'" 
  onmouseover="this.style.background='#a4b97f'" 
  onmouseout="this.style.background='#c5d8a4'" 
  style="background:#c5d8a4;color:#fff;border:none;padding:10px 20px;
         border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;
         box-shadow:0 4px 8px rgba(0,0,0,.2);">
⮑ رجوع
</button>
 </div>

  <!-- CITY NAME -->
  <h1 id="city-name">الرباط</h1>
  <hr />

  <!-- COUNTDOWN -->
  <div id="countdown">متبقي حتى الصلاة التالية<br>--:--:--</div>
  <audio id="adhan-audio" src="https://www.islamcan.com/audio/adhan/azan1.mp3"></audio>

  <!-- PRAYER TIMINGS -->
  <div class="cards-wrapper">
    <div class="card"><div class="header">الفجر</div><div class="body"><h1 id="fajr">--:--</h1></div></div>
    <div class="card"><div class="header">الظهر</div><div class="body"><h1 id="dhuhr">--:--</h1></div></div>
    <div class="card"><div class="header">العصر</div><div class="body"><h1 id="asr">--:--</h1></div></div>
    <div class="card"><div class="header">المغرب</div><div class="body"><h1 id="maghrib">--:--</h1></div></div>
    <div class="card"><div class="header">العشاء</div><div class="body"><h1 id="isha">--:--</h1></div></div>
  </div>

  <!-- CHANGE CITY SELECT -->
  <div class="select-wrapper">
    <select id="city-select">
      <option value="الرباط">الرباط</option>
      <option value="سلا">سلا</option>
      <option value="القنيطرة">القنيطرة</option>
      <option value="الدار البيضاء">الدار البيضاء</option>
      <option value="الجديدة">الجديدة</option>
      <option value="طنجة">طنجة</option>
      <option value="مراكش">مراكش</option>
      <option value="بني ملال">بني ملال</option>
      <option value="فاس">فاس</option>
      <option value="مكناس">مكناس</option>
      <option value="أكادير">أكادير</option>
      <option value="وجدة">وجدة</option>
      <option value="تطوان">تطوان</option>
      <option value="الحسيمة">الحسيمة</option>
      <option value="الراشيدية">الراشيدية</option>
      <option value="الداخلة">الداخلة</option>
      <option value="العيون">العيون</option>
      <option value="الناظور">الناظور</option>
    </select>
  </div>

  <!-- Toast + Ding -->
  <div id="toast"></div>
  <audio id="toast-sound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

 <!-- SCRIPT -->
 <script>
  const cityMap = {
    "الرباط": "Rabat", "سلا": "Sale", "القنيطرة": "Kenitra", "الدار البيضاء": "Casablanca",
    "الجديدة": "El Jadida", "طنجة": "Tangier", "مراكش": "Marrakech", "بني ملال": "Beni Mellal",
    "فاس": "Fes", "مكناس": "Meknes", "أكادير": "Agadir", "وجدة": "Oujda",
    "تطوان": "Tetouan", "الحسيمة": "Al Hoceima", "الراشيدية": "Errachidia",
    "الداخلة": "Dakhla", "العيون": "Laayoune", "الناظور": "Nador"
  };

  const prayerNames = { Fajr: "الفجر", Dhuhr: "الظهر", Asr: "العصر", Maghrib: "المغرب", Isha: "العشاء" };

  let currentTimings = {};
  let countdownInterval;

  function startCountdown() {
    if (countdownInterval) clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      const now = new Date();
      const prayerOrder = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
      let nextPrayer = null;
      let nextTime = null;

      for (let p of prayerOrder) {
        const [h, m] = currentTimings[p].split(":").map(Number);
        const prayerDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
        if (prayerDate > now) { nextPrayer = p; nextTime = prayerDate; break; }
      }

      if (!nextPrayer) {
        nextPrayer = "Fajr";
        const [h, m] = currentTimings["Fajr"].split(":").map(Number);
        nextTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, h, m);
      }

      const diff = nextTime - now;
      const hours = String(Math.floor(diff / 1000 / 60 / 60)).padStart(2, "0");
      const minutes = String(Math.floor((diff / 1000 / 60) % 60)).padStart(2, "0");
      const seconds = String(Math.floor((diff / 1000) % 60)).padStart(2, "0");

      document.getElementById("countdown").innerHTML =
        `متبقي حتى صلاة ${prayerNames[nextPrayer]} <span>${hours}:${minutes}:${seconds}</span>`;

      if (diff <= 0) {
        document.getElementById("adhan-audio").play();
        clearInterval(countdownInterval);
        setTimeout(startCountdown, 60 * 1000);
      }
    }, 1000);
  }

  async function loadPrayerTimes(cityArabic) {
    document.getElementById("city-name").textContent = cityArabic;
    document.getElementById("city-select").value = cityArabic;
    localStorage.setItem("selectedCity", cityArabic);

    const cityEnglish = cityMap[cityArabic];
    try {
      const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${cityEnglish}&country=Morocco&method=2`);
      const data = await response.json();
      currentTimings = data.data.timings;

      document.getElementById("fajr").textContent = currentTimings.Fajr;
      document.getElementById("dhuhr").textContent = currentTimings.Dhuhr;
      document.getElementById("asr").textContent = currentTimings.Asr;
      document.getElementById("maghrib").textContent = currentTimings.Maghrib;
      document.getElementById("isha").textContent = currentTimings.Isha;

      startCountdown();
    } catch {
      alert("خطأ في جلب مواقيت الصلاة");
    }
  }

  window.addEventListener("load", () => {
    const savedCity = localStorage.getItem("selectedCity") || "الرباط";
    loadPrayerTimes(savedCity);
  });

  document.getElementById("city-select").addEventListener("change", (e) => {
    loadPrayerTimes(e.target.value);
  });
</script>
</body>
</html>
